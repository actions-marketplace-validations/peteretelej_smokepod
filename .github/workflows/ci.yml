name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GOLANGCI_LINT_VERSION: v2.8.0

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -v -race -p 1 ./...

      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    # Lint is advisory - don't block PRs on opinionated linter rules
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -v ./cmd/smokepod

      - name: Verify examples compile
        run: |
          cd examples/library-usage
          go build -v .

  action-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build and install smokepod to PATH
        shell: bash
        run: |
          ext=""
          case "$(uname -s)" in
            MINGW*|MSYS*|CYGWIN*) ext=".exe" ;;
          esac
          go build -o "smokepod${ext}" ./cmd/smokepod
          mkdir -p "$HOME/.local/bin"
          mv "smokepod${ext}" "$HOME/.local/bin/smokepod${ext}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Record fixture via action
        uses: ./
        with:
          install: 'false'
          mode: record
          target: ${{ runner.os == 'Windows' && 'cmd.exe' || '/bin/sh' }}
          tests: testdata/fixtures/simple.test
          fixtures: testdata/action-fixtures/

      - name: Verify fixture via action
        uses: ./
        with:
          install: 'false'
          mode: verify
          target: ${{ runner.os == 'Windows' && 'cmd.exe' || '/bin/sh' }}
          tests: testdata/fixtures/simple.test
          fixtures: testdata/action-fixtures/

  npm-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Build local smokepod binary
        shell: bash
        run: |
          ext=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            ext=".exe"
          fi

          go build -o "$RUNNER_TEMP/smokepod$ext" ./cmd/smokepod

      - name: Pack wrapper and verify tarball contents
        shell: bash
        run: |
          pack_json=$(cd npm && npm pack --json)
          tarball=$(node -e "const data = JSON.parse(process.argv[1]); process.stdout.write(data[0].filename);" "$pack_json")
          echo "SMOKEPOD_TARBALL=$PWD/npm/$tarball" >> "$GITHUB_ENV"
          tar -tf "$PWD/npm/$tarball"

          for required in \
            package/package.json \
            package/install.mjs \
            package/README.md \
            package/bin/run.js \
            package/vendor/.gitkeep
          do
            tar -tf "$PWD/npm/$tarball" | grep -Fx "$required" >/dev/null
          done

      - name: Install packed wrapper into sample project
        shell: bash
        run: |
          ext=""
          vendor_binary="smokepod"
          if [ "$RUNNER_OS" = "Windows" ]; then
            ext=".exe"
            vendor_binary="smokepod.exe"
          fi

          sample_dir="$RUNNER_TEMP/npm-smoke-sample"
          mkdir -p "$sample_dir"
          cat <<'EOF' > "$sample_dir/package.json"
          {
            "name": "smokepod-npm-smoke",
            "private": true,
            "type": "module"
          }
          EOF

          (
            cd "$sample_dir"
            SMOKEPOD_BINARY="$RUNNER_TEMP/smokepod$ext" npm install "$SMOKEPOD_TARBALL"
          )

          test -f "$sample_dir/node_modules/smokepod/vendor/$vendor_binary"
          (
            cd "$sample_dir"
            npx --no-install smokepod --version
          )
